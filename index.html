<!DOCTYPE html>
<html>
<head>
    <title>Smart Budget App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <div id="welcomeScreen">
    <h1>👋 Welcome to Smart Budget App</h1>
    <p>Manage your income and expenses easily</p>
    <button onclick="startApp()">Continue</button>
</div>

<div id="mainApp" style="display:none;">

    <h1>💰 Smart Budget App</h1>

    <div class="container">
        <h2>Balance: ₹<span id="balance">0</span></h2>

       <input type="text" id="desc" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">
        
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button onclick="addTransaction()">Add</button>

        <h3>Transactions</h3>
        <ul id="list"></ul>

        <h3 id="advice"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
</div>
